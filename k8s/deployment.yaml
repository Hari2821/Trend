apiVersion: apps/v1
kind: Deployment
metadata:
  name: trend-web
  namespace: trend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trend-web
  template:
    metadata:
      labels:
        app: trend-web
    spec:
      containers:
        - name: trend-web
          image: DOCKERHUB_USER/trend:latest
          ports:
            - containerPort: 3000
